<div class="page-container">
  <mat-card class="services-card">
    <div class="services-header">
      <p class="eyebrow">Our services</p>
      <h1 class="card-title">Turn support that helps your property look ready, faster.</h1>
      <p class="card-subtitle">
        Practical services for multifamily teams that need turns moving and units ready to show.
      </p>
    </div>

    <div class="service-grid">
      @for (service of services; track service.title) {
        <article class="service-card">
          <h2>{{ service.title }}</h2>
          <p>{{ service.description }}</p>
        </article>
      }
    </div>

    <div class="services-cta">
      <a class="primary-cta" mat-flat-button routerLink="/get-a-quote">
        Get a Fast Quote
      </a>
    </div>
  </mat-card>
</div>
