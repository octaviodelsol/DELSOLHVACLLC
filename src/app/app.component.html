<header class="site-header">
  <div class="header-inner">
    <a class="brand" routerLink="/" aria-label="Local Service Co home">
      <img
        [src]="isDarkMode ? 'assets/logo_white.png' : 'assets/logo.png'"
        alt="Local Service Co logo"
        class="brand-logo"
        decoding="async"
      />
      <div class="brand-copy">
        <span class="brand-name">Local Service Co</span>
        <span class="brand-tagline">Fast local service without the scramble</span>
      </div>
    </a>

    <div class="header-controls">
      <button
        type="button"
        class="theme-toggle"
        (click)="toggleTheme()"
        [attr.aria-pressed]="isDarkMode"
        [attr.aria-label]="isDarkMode ? 'Switch to light mode' : 'Switch to dark mode'"
      >
        <mat-icon>{{ isDarkMode ? 'light_mode' : 'dark_mode' }}</mat-icon>
        <span>{{ isDarkMode ? 'Light' : 'Dark' }}</span>
      </button>

      <button
        type="button"
        class="menu-toggle"
        (click)="toggleMobileMenu()"
        [attr.aria-expanded]="mobileMenuOpen"
        aria-controls="primary-nav"
        aria-label="Toggle navigation menu"
      >
        <mat-icon>{{ mobileMenuOpen ? 'close' : 'menu' }}</mat-icon>
      </button>
    </div>

    <nav
      id="primary-nav"
      class="site-nav"
      [class.open]="mobileMenuOpen"
      aria-label="Primary"
    >
      <a mat-button routerLink="/about" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }" (click)="closeMobileMenu()">About</a>
      <a mat-button routerLink="/services" routerLinkActive="active" (click)="closeMobileMenu()">Services</a>
      <a mat-button routerLink="/contact" routerLinkActive="active" (click)="closeMobileMenu()">Contact</a>
      <a class="header-cta" mat-flat-button routerLink="/get-a-quote" routerLinkActive="active" (click)="closeMobileMenu()">
        Request a Quote
      </a>
    </nav>
  </div>
</header>

<main class="app-shell">
  <router-outlet></router-outlet>
</main>

<footer class="site-footer">
  <div class="footer-inner">
    <div class="footer-social">
      <div class="social-links" aria-label="Social media links">
        <a
          class="social-link"
          href="https://www.facebook.com/"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="Local Service Co on Facebook"
        >
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M13.5 21v-8h2.7l.4-3h-3.1V8.1c0-.9.3-1.6 1.6-1.6H16.7V3.8c-.3 0-1.4-.1-2.6-.1-2.6 0-4.3 1.6-4.3 4.5V10H7v3h2.8v8h3.7Z" />
          </svg>
          <span>Facebook</span>
        </a>

        <a
          class="social-link"
          href="https://www.instagram.com/"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="Local Service Co on Instagram"
        >
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M7.5 3h9A4.5 4.5 0 0 1 21 7.5v9a4.5 4.5 0 0 1-4.5 4.5h-9A4.5 4.5 0 0 1 3 16.5v-9A4.5 4.5 0 0 1 7.5 3Zm0 1.8A2.7 2.7 0 0 0 4.8 7.5v9a2.7 2.7 0 0 0 2.7 2.7h9a2.7 2.7 0 0 0 2.7-2.7v-9a2.7 2.7 0 0 0-2.7-2.7h-9Zm9.45 1.35a1.05 1.05 0 1 1 0 2.1 1.05 1.05 0 0 1 0-2.1ZM12 7.5A4.5 4.5 0 1 1 7.5 12 4.5 4.5 0 0 1 12 7.5Zm0 1.8A2.7 2.7 0 1 0 14.7 12 2.7 2.7 0 0 0 12 9.3Z" />
          </svg>
          <span>Instagram</span>
        </a>

        <a
          class="social-link"
          href="https://www.linkedin.com/"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="Local Service Co on LinkedIn"
        >
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M6.1 8.7H2.8V21h3.3V8.7ZM4.4 3A1.9 1.9 0 1 0 4.4 6.8 1.9 1.9 0 0 0 4.4 3Zm5 5.7H12.6v1.7h.1c.4-.8 1.5-2 3.2-2 3.4 0 4.1 2.2 4.1 5.2V21h-3.3v-6.5c0-1.6 0-3.5-2.1-3.5s-2.5 1.7-2.5 3.4V21H9.4V8.7Z" />
          </svg>
          <span>LinkedIn</span>
        </a>
      </div>
    </div>

    <div class="footer-meta">
      <span>&copy; {{ currentYear }} Local Service Co</span>
    </div>
  </div>
</footer>
